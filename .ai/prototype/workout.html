<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>锻炼中 - 脊柱侧弯锻炼追踪器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        .timer-font {
            font-family: 'Roboto Mono', monospace;
            font-variant-numeric: tabular-nums;
        }
        .phase-exercise {
            background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 100%);
        }
        .phase-rest {
            background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%);
        }
        .phase-project-rest {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
        }
        .pause-overlay {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen">
    <!-- Status Bar Spacer -->
    <div class="h-6 bg-gray-900"></div>

    <!-- Full Screen Workout Container -->
    <div class="max-w-md mx-auto bg-gray-900 min-h-screen flex flex-col relative overflow-hidden">
        <!-- Top Bar - Progress -->
        <div class="px-5 pt-6 pb-4" data-annotation="整体进度条">
            <div class="flex items-center justify-between text-gray-400 text-sm mb-2">
                <span>整体进度</span>
                <span>3 / 9 项目</span>
            </div>
            <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                <div class="h-full bg-gradient-to-r from-orange-400 to-orange-500 rounded-full transition-all duration-300" style="width: 33%"></div>
            </div>
        </div>

        <!-- Phase Badge -->
        <div class="px-5 mb-4" data-annotation="当前阶段指示器">
            <div class="phase-exercise inline-flex items-center px-4 py-2 rounded-full">
                <span class="w-2 h-2 bg-white rounded-full mr-2 animate-pulse"></span>
                <span class="text-white font-medium">锻炼中</span>
            </div>
        </div>

        <!-- Main Timer Display -->
        <div class="flex-1 flex flex-col items-center justify-center px-5" data-annotation="主计时器显示区域">
            <!-- Exercise Name -->
            <p class="text-gray-400 text-lg mb-2">第 2 个项目</p>
            <h1 class="text-white text-3xl font-bold mb-8">上胸弯对抗</h1>

            <!-- Set Counter -->
            <div class="text-gray-400 text-lg mb-6">
                第 <span class="text-orange-400 text-2xl font-bold">5</span> / <span class="text-white text-2xl font-bold">9</span> 组
            </div>

            <!-- Countdown Timer -->
            <div class="timer-font text-white text-8xl font-bold mb-8" data-annotation="倒计时数字 - 使用等宽字体">
                42
            </div>

            <!-- Set Progress -->
            <div class="w-full max-w-xs" data-annotation="当前项目的组进度">
                <div class="flex gap-1 justify-center">
                    <div class="w-8 h-2 rounded-full bg-orange-400"></div>
                    <div class="w-8 h-2 rounded-full bg-orange-400"></div>
                    <div class="w-8 h-2 rounded-full bg-orange-400"></div>
                    <div class="w-8 h-2 rounded-full bg-orange-400"></div>
                    <div class="w-8 h-2 rounded-full bg-orange-400 animate-pulse"></div>
                    <div class="w-8 h-2 rounded-full bg-gray-700"></div>
                    <div class="w-8 h-2 rounded-full bg-gray-700"></div>
                    <div class="w-8 h-2 rounded-full bg-gray-700"></div>
                    <div class="w-8 h-2 rounded-full bg-gray-700"></div>
                </div>
            </div>
        </div>

        <!-- Control Buttons -->
        <div class="px-5 pb-12 pt-6" data-annotation="底部控制按钮区域">
            <div class="flex items-center justify-center gap-4">
                <!-- Stop Button -->
                <button class="bg-red-500 hover:bg-red-600 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-colors">
                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                    </svg>
                </button>

                <!-- Pause/Resume Button -->
                <button class="bg-white hover:bg-gray-100 text-gray-900 w-20 h-20 rounded-full flex items-center justify-center shadow-xl transition-colors">
                    <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>

                <!-- Skip Button -->
                <button class="bg-gray-700 hover:bg-gray-600 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-colors">
                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>
            </div>

            <!-- Button Labels -->
            <div class="flex justify-center gap-16 mt-3 text-gray-400 text-sm">
                <span>结束</span>
                <span class="text-white font-medium">暂停</span>
                <span>跳过</span>
            </div>
        </div>

        <!-- Pause Overlay (Hidden by default) -->
        <div class="absolute inset-0 pause-overlay flex items-center justify-center hidden" data-annotation="暂停状态遮罩层">
            <div class="text-center">
                <div class="text-white text-6xl font-bold mb-4">⏸</div>
                <p class="text-white text-xl">已暂停</p>
                <p class="text-gray-300 mt-2">点击恢复继续锻炼</p>
            </div>
        </div>
    </div>
</body>
</html>
