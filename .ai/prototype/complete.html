<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>锻炼完成 - 脊柱侧弯锻炼追踪器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        .timer-font {
            font-family: 'Roboto Mono', monospace;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Status Bar Spacer -->
    <div class="h-6 bg-white"></div>

    <div class="max-w-md mx-auto bg-white min-h-screen">
        <!-- Header -->
        <header class="px-5 pt-6 pb-4 border-b border-gray-100">
            <div class="flex items-center justify-between">
                <h1 class="text-2xl font-bold text-gray-900">锻炼完成！</h1>
                <span class="text-4xl">🎉</span>
            </div>
            <p class="text-gray-500 mt-1">2026年4月11日 14:32</p>
        </header>

        <!-- Completion Rate Doughnut Chart -->
        <div class="px-5 py-6" data-annotation="完成率环形图">
            <div class="bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl p-6 text-center">
                <p class="text-green-800 text-sm font-medium mb-4">本次完成率</p>
                <div class="relative w-40 h-40 mx-auto">
                    <!-- Doughnut Chart Placeholder -->
                    <svg class="w-full h-full" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#E5E7EB" stroke-width="12"/>
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#10B981" stroke-width="12"
                                stroke-dasharray="251.2" stroke-dashoffset="0"
                                transform="rotate(-90 50 50)"/>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="text-5xl font-bold text-green-600">100%</span>
                    </div>
                </div>
                <p class="text-green-700 mt-4 text-sm">太棒了！全部完成</p>
            </div>
        </div>

        <!-- Key Metrics -->
        <div class="px-5 grid grid-cols-3 gap-3 mb-6" data-annotation="关键指标卡片">
            <div class="bg-gray-50 rounded-xl p-3 text-center">
                <p class="text-gray-500 text-xs">总用时</p>
                <p class="timer-font text-xl font-bold text-gray-900 mt-1">24:32</p>
            </div>
            <div class="bg-gray-50 rounded-xl p-3 text-center">
                <p class="text-gray-500 text-xs">完成组数</p>
                <p class="timer-font text-xl font-bold text-gray-900 mt-1">18/18</p>
            </div>
            <div class="bg-gray-50 rounded-xl p-3 text-center">
                <p class="text-gray-500 text-xs">跳过组数</p>
                <p class="timer-font text-xl font-bold text-gray-900 mt-1">0</p>
            </div>
        </div>

        <!-- Per-Exercise Bar Chart -->
        <div class="px-5 mb-6" data-annotation="各项目完成情况柱状图">
            <h2 class="text-gray-900 font-semibold mb-3">各项目完成情况</h2>
            <div class="bg-gray-50 rounded-xl p-4">
                <div class="space-y-3">
                    <!-- Exercise 1 -->
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span class="text-gray-700">抱头展胸</span>
                            <span class="text-gray-500">9/9 组</span>
                        </div>
                        <div class="h-3 bg-gray-200 rounded-full overflow-hidden">
                            <div class="h-full bg-green-500 rounded-full" style="width: 100%"></div>
                        </div>
                    </div>
                    <!-- Exercise 2 -->
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span class="text-gray-700">上胸弯对抗</span>
                            <span class="text-gray-500">9/9 组</span>
                        </div>
                        <div class="h-3 bg-gray-200 rounded-full overflow-hidden">
                            <div class="h-full bg-green-500 rounded-full" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Comparison with Last Session -->
        <div class="px-5 mb-6" data-annotation="与上次锻炼对比">
            <h2 class="text-gray-900 font-semibold mb-3">与上次对比</h2>
            <div class="bg-gray-50 rounded-xl p-4">
                <div class="flex items-center justify-between">
                    <div class="flex-1">
                        <p class="text-gray-500 text-sm">完成率</p>
                        <p class="text-green-600 font-semibold flex items-center mt-1">
                            +5%
                            <svg class="w-4 h-4 ml-1" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M7 14l5-5 5 5z"/>
                            </svg>
                        </p>
                    </div>
                    <div class="w-px h-8 bg-gray-300"></div>
                    <div class="flex-1 text-center">
                        <p class="text-gray-500 text-sm">用时</p>
                        <p class="text-gray-600 font-semibold mt-1">-1:23</p>
                    </div>
                    <div class="w-px h-8 bg-gray-300"></div>
                    <div class="flex-1 text-right">
                        <p class="text-gray-500 text-sm">跳过</p>
                        <p class="text-green-600 font-semibold flex items-center justify-end mt-1">
                            -3
                            <svg class="w-4 h-4 ml-1" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M7 14l5-5 5 5z"/>
                            </svg>
                        </p>
                    </div>
                </div>
                <p class="text-gray-400 text-xs mt-3 text-center">上次：4月10日 · 95% · 25:55</p>
            </div>
        </div>

        <!-- Notes Input -->
        <div class="px-5 mb-6" data-annotation="可选备注输入框">
            <h2 class="text-gray-900 font-semibold mb-3">备注（可选）</h2>
            <textarea
                class="w-full h-24 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-700 placeholder-gray-400 resize-none focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent"
                placeholder="记录今天的感受..."></textarea>
        </div>

        <!-- Action Button -->
        <div class="px-5 pb-12" data-annotation="返回首页按钮">
            <button class="w-full py-4 bg-gradient-to-r from-green-500 to-emerald-500 text-white text-lg font-bold rounded-2xl shadow-lg">
                返回首页
            </button>
        </div>
    </div>
</body>
</html>
