<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>历史记录 - 脊柱侧弯锻炼追踪器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Status Bar Spacer -->
    <div class="h-6 bg-white"></div>

    <div class="max-w-md mx-auto bg-white min-h-screen flex flex-col">
        <!-- Header -->
        <header class="px-5 pt-6 pb-4 border-b border-gray-100">
            <h1 class="text-2xl font-bold text-gray-900">历史记录</h1>
            <p class="text-gray-500 text-sm mt-1">查看你的锻炼趋势</p>
        </header>

        <!-- View Toggle -->
        <div class="px-5 py-4" data-annotation="周/月视图切换">
            <div class="flex bg-gray-100 rounded-xl p-1">
                <button class="flex-1 py-2 text-sm font-medium text-white bg-orange-500 rounded-lg">周视图</button>
                <button class="flex-1 py-2 text-sm font-medium text-gray-600">月视图</button>
            </div>
        </div>

        <!-- Calendar View -->
        <div class="px-5 mb-6" data-annotation="日历视图 - 4月2026">
            <div class="bg-gray-50 rounded-2xl p-4">
                <!-- Month Header -->
                <div class="flex items-center justify-between mb-4">
                    <button class="p-2 -ml-2 text-gray-400 hover:text-gray-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <h3 class="font-semibold text-gray-900">2026年4月</h3>
                    <button class="p-2 -mr-2 text-gray-400 hover:text-gray-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>

                <!-- Weekday Headers -->
                <div class="grid grid-cols-7 gap-1 mb-2">
                    <div class="text-center text-xs text-gray-400 py-1">日</div>
                    <div class="text-center text-xs text-gray-400 py-1">一</div>
                    <div class="text-center text-xs text-gray-400 py-1">二</div>
                    <div class="text-center text-xs text-gray-400 py-1">三</div>
                    <div class="text-center text-xs text-gray-400 py-1">四</div>
                    <div class="text-center text-xs text-gray-400 py-1">五</div>
                    <div class="text-center text-xs text-gray-400 py-1">六</div>
                </div>

                <!-- Calendar Grid -->
                <div class="grid grid-cols-7 gap-1">
                    <!-- Previous Month -->
                    <div class="aspect-square"></div>
                    <div class="aspect-square"></div>
                    <div class="aspect-square"></div>
                    <!-- Current Month -->
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-300">1</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-300">2</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-300">3</div>

                    <div class="aspect-square flex items-center justify-center text-sm bg-green-500 text-white rounded-lg font-medium">4</div>
                    <div class="aspect-square flex items-center justify-center text-sm bg-green-500 text-white rounded-lg font-medium">5</div>
                    <div class="aspect-square flex items-center justify-center text-sm bg-green-500 text-white rounded-lg font-medium">6</div>
                    <div class="aspect-square flex items-center justify-center text-sm bg-green-500 text-white rounded-lg font-medium">7</div>
                    <div class="aspect-square flex items-center justify-center text-sm bg-green-500 text-white rounded-lg font-medium">8</div>
                    <div class="aspect-square flex items-center justify-center text-sm bg-green-500 text-white rounded-lg font-medium">9</div>
                    <div class="aspect-square flex items-center justify-center text-sm bg-green-500 text-white rounded-lg font-medium">10</div>

                    <div class="aspect-square flex items-center justify-center text-sm bg-green-500 text-white rounded-lg font-medium ring-2 ring-orange-400 ring-offset-2">11</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">12</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">13</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">14</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">15</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">16</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">17</div>

                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">18</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">19</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">20</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">21</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">22</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">23</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">24</div>

                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">25</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">26</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">27</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">28</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">29</div>
                    <div class="aspect-square flex items-center justify-center text-sm text-gray-400">30</div>
                </div>

                <!-- Legend -->
                <div class="flex justify-center gap-4 mt-4 text-xs text-gray-500">
                    <div class="flex items-center gap-1">
                        <div class="w-3 h-3 bg-green-500 rounded"></div>
                        <span>完成</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <div class="w-3 h-3 bg-yellow-400 rounded"></div>
                        <span>部分</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <div class="w-3 h-3 bg-gray-200 rounded"></div>
                        <span>未锻炼</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Weekly Trend Chart -->
        <div class="px-5 mb-6" data-annotation="周趋势折线图">
            <h2 class="text-gray-900 font-semibold mb-3">最近7天趋势</h2>
            <div class="bg-gray-50 rounded-2xl p-4">
                <!-- Chart Placeholder -->
                <div class="h-40 flex items-end justify-between gap-2">
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-full bg-green-500 rounded-t" style="height: 100%"></div>
                        <span class="text-xs text-gray-500 mt-2">4/5</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-full bg-green-500 rounded-t" style="height: 100%"></div>
                        <span class="text-xs text-gray-500 mt-2">4/6</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-full bg-green-500 rounded-t" style="height: 100%"></div>
                        <span class="text-xs text-gray-500 mt-2">4/7</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-full bg-green-500 rounded-t" style="height: 100%"></div>
                        <span class="text-xs text-gray-500 mt-2">4/8</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-full bg-green-500 rounded-t" style="height: 100%"></div>
                        <span class="text-xs text-gray-500 mt-2">4/9</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-full bg-green-500 rounded-t" style="height: 100%"></div>
                        <span class="text-xs text-gray-500 mt-2">4/10</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-full bg-orange-400 rounded-t ring-2 ring-orange-300" style="height: 100%"></div>
                        <span class="text-xs text-gray-500 mt-2">4/11</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Week Comparison -->
        <div class="px-5 mb-6" data-annotation="周平均对比">
            <h2 class="text-gray-900 font-semibold mb-3">周平均对比</h2>
            <div class="bg-gray-50 rounded-2xl p-4">
                <div class="flex items-center justify-between">
                    <div class="flex-1">
                        <p class="text-gray-500 text-sm">本周平均</p>
                        <p class="text-green-600 text-2xl font-bold mt-1">98%</p>
                    </div>
                    <div class="w-px h-12 bg-gray-300"></div>
                    <div class="flex-1 text-center">
                        <p class="text-gray-500 text-sm">上周</p>
                        <p class="text-gray-600 text-2xl font-bold mt-1">92%</p>
                    </div>
                    <div class="w-px h-12 bg-gray-300"></div>
                    <div class="flex-1 text-right">
                        <p class="text-gray-500 text-sm">变化</p>
                        <p class="text-green-600 text-lg font-semibold flex items-center justify-end mt-1">
                            +6%
                            <svg class="w-5 h-5 ml-1" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M7 14l5-5 5 5z"/>
                            </svg>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Selected Day Detail (Example) -->
        <div class="px-5 pb-6" data-annotation="选中日期的详细记录">
            <div class="bg-orange-50 border border-orange-200 rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3">
                    <div>
                        <p class="text-orange-800 font-semibold">4月11日 今天</p>
                        <p class="text-orange-600 text-sm">14:32 完成</p>
                    </div>
                    <div class="text-right">
                        <p class="text-orange-900 text-2xl font-bold">100%</p>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2 text-sm">
                    <div class="text-center">
                        <p class="text-orange-600">用时</p>
                        <p class="font-semibold text-orange-900">24:32</p>
                    </div>
                    <div class="text-center">
                        <p class="text-orange-600">完成</p>
                        <p class="font-semibold text-orange-900">18/18</p>
                    </div>
                    <div class="text-center">
                        <p class="text-orange-600">跳过</p>
                        <p class="font-semibold text-orange-900">0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
