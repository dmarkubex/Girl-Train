<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>脊柱侧弯锻炼追踪器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        .gradient-btn {
            background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 100%);
        }
        .gradient-btn:active {
            background: linear-gradient(135deg, #E67E3A 0%, #E55A2B 100%);
            transform: scale(0.98);
        }
        .streak-badge {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Status Bar Spacer -->
    <div class="h-6 bg-white"></div>

    <!-- Main Container - Mobile First (375px) -->
    <div class="max-w-md mx-auto bg-white min-h-screen flex flex-col">
        <!-- Header -->
        <header class="px-5 pt-6 pb-4" data-annotation="应用标题和日期">
            <h1 class="text-2xl font-bold text-gray-900">锻炼追踪</h1>
            <p class="text-sm text-gray-500 mt-1">2026年4月11日 星期六</p>
        </header>

        <!-- Streak Badge -->
        <div class="px-5 mb-6" data-annotation="连续锻炼天数徽章">
            <div class="streak-badge rounded-2xl p-4 flex items-center justify-between shadow-sm">
                <div>
                    <p class="text-orange-900 text-sm font-medium">当前连续</p>
                    <p class="text-orange-900 text-3xl font-bold">7 天</p>
                </div>
                <div class="text-right">
                    <p class="text-orange-800 text-sm">历史最长</p>
                    <p class="text-orange-800 text-lg font-semibold">12 天</p>
                </div>
                <div class="text-5xl ml-3">🔥</div>
            </div>
        </div>

        <!-- Today's Status -->
        <div class="px-5 mb-6" data-annotation="今日锻炼状态卡片">
            <div class="bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl p-5 border border-green-200">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-green-800 text-sm font-medium">今日状态</p>
                        <p class="text-green-900 text-xl font-bold mt-1">已完成 ✓</p>
                    </div>
                    <div class="text-right">
                        <p class="text-green-700 text-sm">完成率</p>
                        <p class="text-green-900 text-2xl font-bold">100%</p>
                    </div>
                </div>
                <div class="mt-3 pt-3 border-t border-green-200">
                    <p class="text-green-700 text-sm">用时 24分32秒 · 跳过 0组</p>
                </div>
            </div>
        </div>

        <!-- Main Action Button -->
        <div class="px-5 mb-8 flex-1 flex items-center" data-annotation="主要行动按钮 - 开始锻炼">
            <button class="gradient-btn w-full py-5 rounded-3xl shadow-lg text-white text-xl font-bold transition-all duration-100 flex items-center justify-center gap-3">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                开始锻炼
            </button>
        </div>

        <!-- Bottom Navigation -->
        <nav class="border-t border-gray-200 px-6 py-3 pb-8" data-annotation="底部导航栏">
            <div class="flex justify-around">
                <a href="#" class="flex flex-col items-center text-orange-500">
                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                    <span class="text-xs mt-1 font-medium">首页</span>
                </a>
                <a href="#" class="flex flex-col items-center text-gray-400">
                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/>
                    </svg>
                    <span class="text-xs mt-1">历史</span>
                </a>
                <a href="#" class="flex flex-col items-center text-gray-400">
                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/>
                    </svg>
                    <span class="text-xs mt-1">配置</span>
                </a>
            </div>
        </nav>
    </div>
</body>
</html>
